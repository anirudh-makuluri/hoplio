# Manual Play internal deploy only.
# Automatic routing (OTA vs Play) lives in mobile-deploy.yml so a single
# push never runs both paths.
#
# Required GitHub secret:
#   EXPO_TOKEN — Expo personal access token
#     https://expo.dev/accounts/[account]/settings/access-tokens
#
# One-time Expo / Play Console setup (not stored in this repo):
#   1. App exists in Play Console (package: com.arm8tron.hoplio)
#   2. Google Play service account key uploaded to EAS credentials
#        eas credentials --platform android
#      or Expo dashboard → Project → Credentials → Android
#   3. Service account invited in Play Console with Release permissions
#   4. At least one successful local `eas build -p android --profile production`
#      so credentials and project config exist for non-interactive CI
#   5. Internal testing track created; testers added under Testers
#
# Prefer on main:
#   - push with native/config changes → mobile-deploy.yml (Play path)
#   - commit message [play] or [native] → force Play via mobile-deploy.yml
#   - workflow_dispatch on mobile-deploy.yml with force=play-internal
# Use this workflow for an explicit manual rebuild outside that router.

name: Play Internal Testing

on:
  workflow_dispatch:

concurrency:
  group: mobile-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and submit to Play internal
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android and submit to Play internal track
        working-directory: apps/mobile
        run: >
          eas build
          --platform android
          --profile production
          --auto-submit-with-profile internal
          --non-interactive
